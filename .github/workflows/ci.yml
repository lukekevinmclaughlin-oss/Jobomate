name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: C# engine (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore Jobomate.sln
      - name: Build
        run: dotnet build Jobomate.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test Jobomate.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck (renderer)
        run: npx tsc --noEmit
      - name: Typecheck (electron)
        run: npx tsc -p tsconfig.electron.json
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
