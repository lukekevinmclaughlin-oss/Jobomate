name: CI

# Manual-only: pushes must not consume the account-level Actions budget.
# The same gate runs locally before every push (npm run lint && npx tsc --noEmit
# && npx tsc -p tsconfig.electron.json && npm test && npm run build); trigger
# this workflow from the Actions tab when a cloud run is explicitly wanted.
on:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: C# engine (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore Jobomate.sln
      - name: Build
        run: dotnet build Jobomate.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test Jobomate.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck (renderer)
        run: npx tsc --noEmit
      - name: Typecheck (electron)
        run: npx tsc -p tsconfig.electron.json
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
      # Advisory-only: surfaces new high/critical advisories in the run log without failing
      # the gate. Most advisories here are transitive dev-only deps (electron-builder, concurrently)
      # that don't ship to end users; we don't want an unfixable upstream issue to block all PRs.
      # Triage happens offline. Flip to a hard failure once the audit is clean.
      - name: Security audit (advisory)
        run: npm audit --audit-level=high
        continue-on-error: true
