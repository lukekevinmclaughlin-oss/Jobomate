<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 300px; margin: 0; font-family: -apple-system, "Segoe UI", sans-serif; background: #0E1116; color: #F3F5F7; }
    .hd { display: flex; align-items: center; gap: 10px; padding: 14px 14px 8px; }
    .hd img { width: 34px; height: 34px; border-radius: 8px; background: #fff; padding: 3px; }
    .hd b { font-size: 15px; }
    .body { padding: 4px 14px 14px; }
    .status { font-size: 12.5px; padding: 8px 10px; border-radius: 8px; background: #161B22; border: 1px solid #2A313C; margin-bottom: 10px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    button { width: 100%; padding: 9px; border-radius: 8px; border: 1px solid #2A313C; background: #1C2330; color: #F3F5F7; font-size: 13px; cursor: pointer; margin-top: 8px; }
    button.primary { background: #2F6BF6; border-color: #2F6BF6; color: #fff; font-weight: 600; }
    .muted { color: #9AA4B2; font-size: 11.5px; line-height: 1.4; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="hd">
    <img src="icons/icon128.png" alt="Jobomate" />
    <b>Jobomate</b>
  </div>
  <div class="body">
    <div class="status" id="status"><span class="dot" style="background:#888"></span>Checking…</div>
    <button class="primary" id="sendBtn">Send this job to Jobomate</button>
    <button id="resumeBtn">I've handled it — Resume</button>
    <button id="reconnectBtn">Reconnect to Jobomate</button>
    <div class="muted">Jobomate researches jobs in your own logged-in browser. On any login or CAPTCHA it pauses and asks you to take over — it never bypasses them.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
