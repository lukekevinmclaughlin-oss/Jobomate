<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jobomate — AI-driven job-hunt assistant with LLM research, tailored drafting, and approval pipeline"
    />
    <title>Jobomate</title>
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <link rel="apple-touch-icon" href="/src/assets/logo.png" />
    <style>
      /* Critical inline styles to prevent flash */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #202124;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        height: 100%;
      }
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #9aa0a6;
        gap: 16px;
      }
      .loading-screen__spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #3c4043;
        border-top-color: #8ab4f8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-screen__spinner"></div>
        <span>Loading Jobomate...</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
